name: Tara FVG Scanner
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install tradingview-ta requests

      - name: Run Python Script
        run: python bot.py
